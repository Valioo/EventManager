<div class="admin-tags">
  <div class="header">
    <h1>Tags</h1>
    <form class="add-form" (ngSubmit)="addTag()">
      <input type="text" [(ngModel)]="newName" name="newName" placeholder="Tag name" required />
      <button type="submit" class="btn-primary">Add tag</button>
    </form>
  </div>
  @if (tags$ | async; as list) {
    @if (list.length === 0) {
      <p class="empty">No tags yet. Add one above.</p>
    } @else {
      <table class="table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          @for (tag of list; track tag.id) {
            @if (editingId() === tag.id) {
              <tr class="edit-row">
                <td colspan="2">
                  <form class="inline-form" (ngSubmit)="saveTag(tag)">
                    <input type="text" [(ngModel)]="editName" name="editName" placeholder="Name" />
                    <button type="submit" class="btn-primary">Save</button>
                    <button type="button" class="btn-link" (click)="cancelEdit()">Cancel</button>
                  </form>
                </td>
              </tr>
            } @else {
              <tr>
                <td>{{ tag.name }}</td>
                <td class="actions">
                  <button type="button" class="btn-link" (click)="startEdit(tag)">Edit</button>
                  <button type="button" class="btn-delete" (click)="deleteTag(tag.id)">Delete</button>
                </td>
              </tr>
            }
          }
        </tbody>
      </table>
    }
  } @else {
    <p>Loading…</p>
  }
</div>
