<div class="admin-categories">
  <div class="header">
    <h1>Categories</h1>
    <form class="add-form" (ngSubmit)="addCategory()">
      <input type="text" [(ngModel)]="newName" name="newName" placeholder="Category name" required />
      <button type="submit" class="btn-primary">Add category</button>
    </form>
  </div>
  @if (categories$ | async; as list) {
    @if (list.length === 0) {
      <p class="empty">No categories yet. Add one above.</p>
    } @else {
      <table class="table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          @for (cat of list; track cat.categoryId) {
            @if (editingId() === cat.categoryId) {
              <tr class="edit-row">
                <td colspan="2">
                  <form class="inline-form" (ngSubmit)="saveCategory(cat)">
                    <input type="text" [(ngModel)]="editName" name="editName" placeholder="Name" />
                    <button type="submit" class="btn-primary">Save</button>
                    <button type="button" class="btn-link" (click)="cancelEdit()">Cancel</button>
                  </form>
                </td>
              </tr>
            } @else {
              <tr>
                <td>{{ cat.name }}</td>
                <td class="actions">
                  <button type="button" class="btn-link" (click)="startEdit(cat)">Edit</button>
                  <button type="button" class="btn-delete" (click)="deleteCategory(cat.categoryId)">Delete</button>
                </td>
              </tr>
            }
          }
        </tbody>
      </table>
    }
  } @else {
    <p>Loading…</p>
  }
</div>
